<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LarisIn.ai Pro - Panel Konten Viral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); } </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <header class="gradient-bg text-white py-10 px-4 text-center">
        <h1 class="text-3xl font-bold">🚀 LarisIn.ai Pro</h1>
        <p class="opacity-80">Edisi Khusus Member Premium</p>
    </header>

    <main class="max-w-2xl mx-auto -mt-8 px-4 pb-20">
        <div class="bg-white rounded-2xl shadow-2xl p-6 border border-slate-100">
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">Masukkan Kode Akses Anda:</label>
                <input type="text" id="passcode" class="w-full p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Contoh: PREMIUM-MAR-2026">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">Detail Produk:</label>
                <textarea id="productInput" rows="4" class="w-full p-4 bg-slate-50 border rounded-lg outline-none" placeholder="Tempel deskripsi atau link produk di sini..."></textarea>
            </div>

            <button onclick="prosesAI()" id="btnAction" class="w-full gradient-bg text-white font-bold py-4 rounded-xl shadow-lg hover:brightness-110 transition-all">✨ Generate Konten Viral</button>
        </div>

        <div id="resultArea" class="hidden mt-8 space-y-4">
            <div class="bg-white p-5 rounded-xl border-l-4 border-indigo-500 shadow-sm">
                <p class="font-bold text-indigo-600 mb-2">🎥 TikTok Hook:</p>
                <div id="tiktokOutput" class="text-slate-700 text-sm italic"></div>
            </div>
            <div class="bg-white p-5 rounded-xl border-l-4 border-pink-500 shadow-sm">
                <p class="font-bold text-pink-600 mb-2">📸 Caption Instagram:</p>
                <div id="igOutput" class="text-slate-700 text-sm"></div>
            </div>
        </div>
    </main>

    <script>
        async function prosesAI() {
            const input = document.getElementById('productInput').value;
            const pass = document.getElementById('passcode').value;
            const btn = document.getElementById('btnAction');

            if(!input || !pass) return alert("Lengkapi data dulu!");

            btn.innerText = "Sedang Memproses...";
            btn.disabled = true;

            try {
                // Mengirim ke API internal Vercel (bukan langsung ke Google)
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product: input, passcode: pass })
                });

                const data = await res.json();
                if(!res.ok) throw new Error(data.error);

                document.getElementById('tiktokOutput').innerText = data.tiktok;
                document.getElementById('igOutput').innerText = data.ig;
                document.getElementById('resultArea').classList.remove('hidden');
            } catch (err) {
                alert("Gagal: " + err.message);
            } finally {
                btn.innerText = "✨ Generate Konten Viral";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
